<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- iOS Native PWA Settings -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Dolu Logistics" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="apple-touch-startup-image" href="/loadingscreen.png" />
    
    <title>Dolu Logistics | Safe & Affordable Delivery</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <style>
      #initial-loader {
        position: fixed;
        top: 0; left: 0; width: 100vw; height: 100vh;
        background-color: #F7FAFF;
        display: flex; align-items: center; justify-content: center;
        z-index: 999999;
        transition: opacity 0.6s ease;
      }
      #initial-loader img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .loader-fade-out {
        opacity: 0 !important;
        pointer-events: none !important;
      }
    </style>
    <div id="initial-loader">
      <img src="/loadingscreen.png" alt="Dolu Logistics Loading..." />
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
